<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <div class="nav-left-group">
      <b id="nav-brand" style="color:var(--p); font-size:1.5rem; cursor:pointer;" onclick="location.href='index.html'">Utsukushii</b>
      <span id="gallery-title" style="color:var(--text-s); font-size:0.9rem; margin-left:10px;"></span>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <button id="btn-back-home" style="background:none; border:1px solid var(--brd); color:var(--text); padding:6px 10px; border-radius:999px; cursor:pointer; font-size:0.8rem;">Kembali</button>
    </div>
  </nav>

  <div class="container">
    <div id="gallery-wall-card" class="card hidden" style="padding:0; overflow:hidden; margin-bottom:14px;">
      <div class="cover gallery-wall-cover-wrap">
        <img id="gallery-wall-cover" src="" alt="Foto dinding gallery" style="cursor: default;">
      </div>
    </div>

    <div class="card" style="margin-bottom:14px;">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
        <div>
          <b id="gallery-name" style="font-size:1.05rem;"></b>
          <div id="gallery-sub" style="margin-top:6px; color:var(--text-s); font-size:0.82rem;"></div>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
          <span id="gallery-count" style="color:var(--text-s); font-size:0.82rem;"></span>
        </div>
      </div>
    </div>

    <div id="gallery-pagination" class="gallery-pagination hidden" style="display:flex; justify-content:center; align-items:center; gap:12px; flex-wrap:wrap; margin: 0 0 14px;">
      <button type="button" id="gallery-page-prev" class="btn" style="max-width:140px; padding:8px 14px;">Sebelumnya</button>
      <span id="gallery-page-info" style="color:var(--text-s); font-size:0.85rem; min-width:10ch; text-align:center;"></span>
      <button type="button" id="gallery-page-next" class="btn" style="max-width:140px; padding:8px 14px;">Selanjutnya</button>
    </div>

    <div id="gallery-grid" class="gallery-grid"></div>
    <div id="gallery-empty" class="card hidden" style="text-align:center; color:var(--text-s);">Belum ada foto di gallery ini.</div>
  </div>

  <div id="img-modal" class="modal-overlay gallery-modal-overlay hidden">
    <div class="gallery-modal-container" onclick="event.stopPropagation()">
      <div class="gallery-modal-media">
        <button type="button" id="modal-close" class="gallery-modal-close" aria-label="Tutup">✕</button>
        <button type="button" id="modal-nav-prev" class="gallery-modal-nav gallery-modal-nav-prev" aria-label="Foto sebelumnya">‹</button>
        <div class="gallery-modal-view-inner">
          <div id="modal-img-loading" class="gallery-modal-img-loading hidden" aria-live="polite"></div>
          <img id="modal-img" src="" alt="Preview">
        </div>
        <button type="button" id="modal-nav-next" class="gallery-modal-nav gallery-modal-nav-next" aria-label="Foto berikutnya">›</button>
      </div>
      <div class="gallery-modal-sidebar">
        <div class="gallery-modal-sidebar-header">
          <div class="gallery-modal-sidebar-title">
            <b id="modal-gallery-name">Gallery</b>
            <small id="modal-photo-time"></small>
          </div>
          <span id="modal-photo-counter" class="gallery-modal-counter"></span>
        </div>
        <div class="gallery-modal-sidebar-body">
          <div class="detail-comments gallery-modal-comments">
            <div class="detail-comments-header">
              <b>Komentar</b>
              <span id="modal-comment-count" class="detail-comments-count"></span>
            </div>
            <div id="modal-comments-list" class="detail-comments-list"></div>
            <div class="detail-comment-form">
              <textarea id="modal-comment-input" rows="2" placeholder="Tulis komentar sebagai tamu..."></textarea>
              <button id="modal-comment-send" type="button" class="btn detail-comment-send">Kirim</button>
            </div>
          </div>
        </div>
        <div class="gallery-modal-sidebar-footer">
          <span id="modal-guest-label" class="gallery-modal-guest-label"></span>
          <a id="modal-download-original" class="gallery-modal-original-link" href="#" target="_blank" rel="noopener noreferrer">Buka Original</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="gallery.js"></script>
</body>
</html>
